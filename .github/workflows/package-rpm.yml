name: Package RPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM (Fedora ${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora_version }}

    strategy:
      fail-fast: false
      matrix:
        fedora_version:
          - 42
          - 43
          - 44
          - rawhide

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          UPSTREAM="${GITHUB_REF_NAME#v}"

          # Translate semver suffix to RPM Version+Release.
          # '-' suffix (pre-release) sorts before final:  Release 0.1.<label>
          # '+' suffix (post-release) sorts after final:  Release 1.<label>
          # No suffix is a final release:                 Release 1
          case "$UPSTREAM" in
            *-*)
              RPM_VERSION="${UPSTREAM%%-*}"
              LABEL="${UPSTREAM#*-}"
              RPM_RELEASE="0.1.${LABEL}%{?dist}" ;;
            *+*)
              RPM_VERSION="${UPSTREAM%%+*}"
              LABEL="${UPSTREAM#*+}"
              RPM_RELEASE="1.${LABEL}%{?dist}" ;;
            *)
              RPM_VERSION="$UPSTREAM"
              RPM_RELEASE="1%{?dist}" ;;
          esac

          echo "upstream=${UPSTREAM}" >> "$GITHUB_OUTPUT"
          echo "rpm_version=${RPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "rpm_release=${RPM_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          dnf --refresh install -y \
              automake \
              curl \
              findutils \
              make \
              rpm-build \
              systemd-rpm-macros \
              perl-interpreter \
              perl-Data-Dumper \
              perl-File-Path \
              perl-Getopt-Long \
              perl-Socket \
              perl-Sys-Hostname \
              perl-version \
              ;

      - name: Build distribution tarball from source
        run: |
          ./autogen
          ./configure
          make dist

      - name: Build RPMs
        run: |
          TOPDIR="$(pwd)/rpmbuild"
          mkdir -p "$TOPDIR"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp ddclient-*.tar.gz "$TOPDIR/SOURCES/"
          cp packaging/rpm/ddclient.spec "$TOPDIR/SPECS/"
          rpmbuild \
            --define "_topdir $TOPDIR" \
            --define "upstream_version ${{ steps.version.outputs.upstream }}" \
            --define "rpm_version ${{ steps.version.outputs.rpm_version }}" \
            --define "rpm_release ${{ steps.version.outputs.rpm_release }}" \
            -ba "$TOPDIR/SPECS/ddclient.spec"

      - name: Collect RPMs
        run: |
          mkdir -p artifacts
          find rpmbuild/RPMS rpmbuild/SRPMS -name '*.rpm' -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ddclient-rpm-${{ steps.version.outputs.upstream }}-fc${{ matrix.fedora_version }}
          path: artifacts/*.rpm

      - name: Attach RPMs to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for rpm in artifacts/*.rpm; do
            gh release upload "${{ github.event.release.tag_name }}" "$rpm" --clobber
          done
