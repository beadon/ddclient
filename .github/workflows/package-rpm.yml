name: Package RPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM (Fedora ${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora_version }}

    strategy:
      fail-fast: false
      matrix:
        fedora_version:
          - 42
          - 43
          - 44
          - rawhide

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf --refresh install -y \
              automake \
              curl \
              findutils \
              make \
              rpm-build \
              systemd-rpm-macros \
              perl-interpreter \
              perl-Data-Dumper \
              perl-File-Path \
              perl-Getopt-Long \
              perl-Socket \
              perl-Sys-Hostname \
              perl-version \
              ;

      - name: Build distribution tarball from source
        run: |
          ./autogen
          ./configure
          make dist

      - name: Build RPMs
        id: build
        run: |
          TOPDIR="$(pwd)/rpmbuild"
          mkdir -p "$TOPDIR"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          TARBALL=$(ls ddclient-*.tar.gz)
          FULL_VERSION="${TARBALL#ddclient-}"
          FULL_VERSION="${FULL_VERSION%.tar.gz}"

          # Translate semver suffix to RPM Version+Release.
          # '-' suffix (pre-release) sorts before final:  Release 0.1.<label>
          # '+' suffix (post-release) sorts after final:  Release 1.<label>
          # No suffix is a final release:                 Release 1
          case "$FULL_VERSION" in
            *-*)
              RPM_VERSION="${FULL_VERSION%%-*}"
              LABEL="${FULL_VERSION#*-}"
              RPM_RELEASE="0.1.${LABEL}%{?dist}" ;;
            *+*)
              RPM_VERSION="${FULL_VERSION%%+*}"
              LABEL="${FULL_VERSION#*+}"
              RPM_RELEASE="1.${LABEL}%{?dist}" ;;
            *)
              RPM_VERSION="$FULL_VERSION"
              RPM_RELEASE="1%{?dist}" ;;
          esac

          cp "$TARBALL" "$TOPDIR/SOURCES/ddclient-${RPM_VERSION}.tar.gz"
          sed \
            -e "s/^Version:.*/Version:        ${RPM_VERSION}/" \
            -e "s/^Release:.*/Release:        ${RPM_RELEASE}/" \
            packaging/rpm/ddclient.spec > "$TOPDIR/SPECS/ddclient.spec"

          rpmbuild --define "_topdir $TOPDIR" -ba "$TOPDIR/SPECS/ddclient.spec"

          echo "version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Collect RPMs
        run: |
          mkdir -p artifacts
          find rpmbuild/RPMS rpmbuild/SRPMS -name '*.rpm' -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ddclient-rpm-${{ steps.build.outputs.version }}-fc${{ matrix.fedora_version }}
          path: artifacts/*.rpm

      - name: Attach RPMs to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          for rpm in artifacts/*.rpm; do
            gh release upload "v${VERSION}" "$rpm" --clobber
          done
