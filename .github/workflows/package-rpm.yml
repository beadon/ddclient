name: Package RPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM (Fedora ${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora_version }}

    strategy:
      fail-fast: false
      matrix:
        fedora_version:
          - 42
          - 43
          - 44
          - rawhide

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf --refresh install -y \
              automake \
              curl \
              findutils \
              make \
              rpm-build \
              rpmdevtools \
              systemd-rpm-macros \
              perl-interpreter \
              perl-Data-Dumper \
              perl-File-Path \
              perl-Getopt-Long \
              perl-Socket \
              perl-Sys-Hostname \
              perl-version \
              ;

      - name: Set up rpmbuild tree
        run: rpmdev-setuptree

      - name: Build distribution tarball from source
        run: |
          ./autogen
          ./configure
          make dist

      - name: Stage tarball and spec for rpmbuild
        id: stage
        run: |
          TARBALL=$(ls ddclient-*.tar.gz)
          FULL_VERSION="${TARBALL#ddclient-}"
          FULL_VERSION="${FULL_VERSION%.tar.gz}"

          # Split MAJOR.MINOR.PATCH from any pre/post-release suffix.
          # '-' suffix (alpha, beta, rc) sorts before final: Release 0.1.<label>
          # '+' suffix (r.N re-releases) sorts after final:  Release 1.<label>
          # No suffix is a final release:                    Release 1
          case "$FULL_VERSION" in
            *-*)
              RPM_VERSION="${FULL_VERSION%%-*}"
              LABEL="${FULL_VERSION#*-}"
              RPM_RELEASE="0.1.${LABEL}%{?dist}" ;;
            *+*)
              RPM_VERSION="${FULL_VERSION%%+*}"
              LABEL="${FULL_VERSION#*+}"
              RPM_RELEASE="1.${LABEL}%{?dist}" ;;
            *)
              RPM_VERSION="$FULL_VERSION"
              RPM_RELEASE="1%{?dist}" ;;
          esac

          cp "$TARBALL" "$HOME/rpmbuild/SOURCES/"
          sed \
            -e "s/^Version:.*/Version:        ${RPM_VERSION}/" \
            -e "s/^Release:.*/Release:        ${RPM_RELEASE}/" \
            packaging/rpm/ddclient.spec > "$HOME/rpmbuild/SPECS/ddclient.spec"
          echo "version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build SRPM
        run: rpmbuild -bs "$HOME/rpmbuild/SPECS/ddclient.spec"

      - name: Build binary RPM
        run: rpmbuild -bb "$HOME/rpmbuild/SPECS/ddclient.spec"

      - name: Collect RPMs
        run: |
          mkdir -p artifacts
          find "$HOME/rpmbuild/RPMS" "$HOME/rpmbuild/SRPMS" -name '*.rpm' -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ddclient-rpm-${{ steps.stage.outputs.version }}-fc${{ matrix.fedora_version }}
          path: artifacts/*.rpm

      - name: Attach RPMs to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.stage.outputs.version }}"
          for rpm in artifacts/*.rpm; do
            gh release upload "v${VERSION}" "$rpm" --clobber
          done
